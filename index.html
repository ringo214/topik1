<style>

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{

    -webkit-text-size-adjust:100%; line-height:1.5;

  }
  header{max-width:760px; margin:0 auto; padding:22px 18px 4px;}
  .kicker{font-size:12px; letter-spacing:.18em; color:var(--muted); text-transform:uppercase; margin-bottom:6px;}
  h1{font-size:22px; margin:0 0 4px; font-weight:800; letter-spacing:-.01em;}
  .sub{color:var(--muted); font-size:13px; margin:0;}
  .wrap{max-width:760px; margin:0 auto; padding:0 18px 60px;}

  .tiers{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:16px 0 10px;}
  .tierbtn{border:1px solid var(--line); background:var(--card); border-radius:12px; padding:10px 8px; text-align:left; cursor:pointer; transition:.15s; position:relative;}
  .tierbtn:hover{transform:translateY(-1px);}
  .tierbtn .num{font-size:11px; font-weight:800; letter-spacing:.08em;}
  .tierbtn .cnt{font-size:19px; font-weight:800; line-height:1.1; margin-top:2px;}
  .tierbtn .lab{font-size:10.5px; color:var(--muted); margin-top:2px; line-height:1.3;}
  .tierbtn .bar{height:4px; background:var(--line); border-radius:99px; margin-top:7px; overflow:hidden;}
  .tierbtn .bar>i{display:block; height:100%; width:0;}
  .tierbtn[data-t="1"] .num{color:var(--t1);} .tierbtn[data-t="1"].on{background:var(--t1b); border-color:var(--t1);} .tierbtn[data-t="1"] .bar>i{background:var(--t1);}
  .tierbtn[data-t="2"] .num{color:var(--t2);} .tierbtn[data-t="2"].on{background:var(--t2b); border-color:var(--t2);} .tierbtn[data-t="2"] .bar>i{background:var(--t2);}
  .tierbtn[data-t="3"] .num{color:var(--t3);} .tierbtn[data-t="3"].on{background:var(--t3b); border-color:var(--t3);} .tierbtn[data-t="3"] .bar>i{background:var(--t3);}
  .tierbtn[data-t="4"] .num{color:var(--t4);} .tierbtn[data-t="4"].on{background:var(--t4b); border-color:var(--t4);} .tierbtn[data-t="4"] .bar>i{background:var(--t4);}

  .tierdesc{font-size:12.5px; color:var(--muted); background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:12px;}

  /* コントロール行 */
  .controls{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; align-items:center;}
  .seg{display:flex; gap:0; border:1px solid var(--line); border-radius:10px; overflow:hidden; background:var(--card);}
  .seg button{border:0; background:transparent; padding:9px 12px; font-size:13px; font-weight:700; cursor:pointer; color:var(--muted);}
  .seg button.on{background:var(--ink); color:#fff;}
  .toggle{border:1px solid var(--line); background:var(--card); border-radius:10px; padding:9px 11px; font-size:12.5px; font-weight:700; cursor:pointer; color:var(--muted);}
  .toggle.on{background:var(--ink); color:#fff; border-color:var(--ink);}
  .spacer{flex:1;}

  .flash{display:none;} .flash.on{display:block;}
  .progress{font-size:12px; color:var(--muted); text-align:center; margin-bottom:8px;}
  .progress b{color:var(--ink);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); padding:34px 22px; min-height:210px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; cursor:pointer; user-select:none; position:relative;}
  .tierchip{position:absolute; top:12px; left:12px; font-size:10.5px; font-weight:800; padding:3px 8px; border-radius:999px; letter-spacing:.05em;}
  .statechip{position:absolute; top:12px; right:12px; font-size:10.5px; font-weight:800; padding:3px 8px; border-radius:999px;}
  .sc-ok{background:var(--okb); color:var(--ok);} .sc-no{background:var(--nob); color:var(--no);} .sc-none{background:#eee7d9; color:var(--muted);}
  .kw{font-size:44px; font-weight:800; letter-spacing:-.01em;}
  .km{font-size:22px; margin-top:14px;}
  .khint{font-size:12px; color:var(--muted); margin-top:16px;}
  .meta{font-size:11.5px; color:var(--muted); margin-top:10px;}
  .speak{position:absolute; bottom:12px; right:14px; border:1px solid var(--line); background:var(--card); border-radius:999px; width:38px; height:38px; font-size:17px; cursor:pointer; display:none;}
  .speak.show{display:block;}

  .judge{display:flex; gap:8px; margin-top:12px;}
  .judge button{flex:1; border:1px solid var(--line); border-radius:12px; padding:14px; font-size:15px; font-weight:800; cursor:pointer;}
  .judge .no{background:var(--nob); color:var(--no); border-color:#eecfca;}
  .judge .ok{background:var(--okb); color:var(--ok); border-color:#cfe6d3;}
  .nav{display:flex; gap:8px; margin-top:8px;}
  .nav button{flex:1; border:1px solid var(--line); background:var(--card); border-radius:12px; padding:11px; font-size:13.5px; font-weight:700; cursor:pointer; color:var(--muted);}

  .list{display:none;} .list.on{display:block;}
  .search{width:100%; border:1px solid var(--line); background:var(--card); border-radius:10px; padding:11px 12px; font-size:14px; margin-bottom:12px;}
  table{width:100%; border-collapse:collapse; font-size:14px;}
  th{text-align:left; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; border-bottom:1px solid var(--line); padding:6px 8px; font-weight:700;}
  td{border-bottom:1px solid var(--line); padding:9px 8px; vertical-align:top;}
  td.w{font-weight:800; font-size:16px; white-space:nowrap;}
  td.m{color:#3a3630;} td.s{color:var(--muted); font-size:11.5px; white-space:nowrap;}
  .dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; vertical-align:middle;}
  .d1{background:var(--t1);} .d2{background:var(--t2);} .d3{background:var(--t3);} .d4{background:var(--t4);}
  .f96{display:inline-block; font-size:10.5px; background:var(--t1b); color:var(--t1); border-radius:6px; padding:1px 6px; margin-left:6px; font-weight:700;}
  .lstate{font-size:10.5px; font-weight:800; padding:1px 7px; border-radius:99px; cursor:pointer; border:1px solid var(--line);}
  .ls-ok{background:var(--okb); color:var(--ok);} .ls-no{background:var(--nob); color:var(--no);} .ls-none{background:transparent; color:var(--muted);}

  .empty{text-align:center; padding:40px 16px; color:var(--muted); font-size:14px; background:var(--card); border:1px solid var(--line); border-radius:16px;}
  .danger{border:0; background:transparent; color:var(--muted); font-size:11.5px; text-decoration:underline; cursor:pointer; padding:6px;}
  footer{max-width:760px; margin:0 auto; padding:6px 18px 40px; color:var(--muted); font-size:11.5px;}
  .warn{background:#fff6e6; border:1px solid #f0dcae; color:#7a5a12; border-radius:10px; padding:8px 12px; font-size:12px; margin-bottom:12px; display:none;}
  @media(max-width:520px){ .kw{font-size:38px;} .tierbtn .cnt{font-size:17px;} .seg button{padding:9px 9px;} }

      <div class="meta" id="cmeta"></div>

    <div class="judge">
      <button class="no" id="markNo">まだ</button>
      <button class="ok" id="markOk">覚えた</button>
    </div>
    <div class="nav">
      <button id="prev">← 前へ</button>
      <button id="shuffle">シャッフル</button>
      <button id="next">スキップ →</button>
    </div>
  </section>

  <section class="list" id="list">

    <table><thead><tr><th>単語</th><th>意味</th><th>状態 / 出典</th></tr></thead>
      <tbody id="tbody"></tbody></table>
  </section>
</div>

<footer id="foot"></footer>

g": "(踊りを)踊る", "tier": 4, "past": "60+83", "past_n": 2, "f96": 0, "inA": false}, {"word": "축제", "meaning": "祭り", "tier": 4, "past": "60+83", "past_n": 2, "f96": 0, "inA": false}, {"word": "춤", "meaning": "踊り", "tier": 4, "past": "60+83", "past_n": 2, "f96": 0, "inA": false}, {"word": "텔레비전", "meaning": "テレビ", "tier": 4, "past": "60+64", "past_n": 2, "f96": 0, "inA": false}, {"word": "편하다", "meaning": "楽だ", "tier": 4, "past": "60+64", "past_n": 2, "f96": 0, "inA": false}, {"word": "피곤하다", "meaning": "疲れる", "tier": 4, "past": "60+83", "past_n": 2, "f96": 0, "inA": false}, {"word": "필요", "meaning": "必要", "tier": 4, "past": "64+83", "past_n": 2, "f96": 0, "inA": false}, {"word": "학원", "meaning": "塾", "tier": 4, "past": "60+64", "past_n": 2, "f96": 0, "inA": false}, {"word": "형", "meaning": "兄", "tier": 4, "past": "60+64", "past_n": 2, "f96": 0, "inA": false}, {"word": "휴일", "meaning": "休日", "tier": 4, "past": "60+64", "past_n": 2, "f96": 0, "inA": false}]};
const TIERS = [
  {t:1, key:"layer1", num:"TIER 1", lab:"頻出A × 過去問頻出",
   desc:"頻出A収録で、かつ過去問(第60/64/83/96回)で2回以上出た語。①と③が重なる最優先。まずここを完璧に。"},
  {t:2, key:"layer2", num:"TIER 2", lab:"頻出A の残り",
   desc:"頻出Aの語で、過去問での再出現が1回以下。①として必須だが、直前は Tier 1 の後に。"},
  {t:3, key:"layer3", num:"TIER 3", lab:"② 第96回で出題(A外)",
   desc:"頻出A外だが第96回に出た語。②の補強。테마依存で集中した語(수영장・에어컨等)も含む。※하다・사람等の超基礎語は頻出Aに単独見出しが無いためここに入っています。"},
  {t:4, key:"layer4", num:"TIER 4", lab:"③ それ以前の過去問コア",
   desc:"頻出A外・第96回にも無く、第60/64/83回で2回以上出た語。③の中核。第83回は一部ページ欠落あり。"},
];

/* ---- 永続化 ---- */
const LS_KEY="topik1_deck_states_v1";
let states={}; // {word: "ok"|"no"}
let canSave=true;
try{ const raw=localStorage.getItem(LS_KEY); if(raw) states=JSON.parse(raw); localStorage.setItem("__t","1"); localStorage.removeItem("__t"); }
catch(e){ canSave=false; }
function save(){ if(!canSave) return; try{ localStorage.setItem(LS_KEY, JSON.stringify(states)); }catch(e){ canSave=false; } }
if(!canSave) document.getElementById("warn").style.display="block";

/* ---- 状態 ---- */
let curTier=1, curMode="flash", idx=0, revealed=false;
let reviewOnly=false, reverse=false, tts=false;
let order=[];

function tierMeta(t){ return TIERS.find(x=>x.t===t); }
function tierData(t){ return DECK[tierMeta(t).key]; }
function stateOf(w){ return states[w]||"none"; }
function visibleData(){
  const d=tierData(curTier);
  return reviewOnly ? d.filter(c=>stateOf(c.word)!=="ok") : d;
}
function counts(t){
  const d=tierData(t); let ok=0;
  d.forEach(c=>{ if(stateOf(c.word)==="ok") ok++; });
  return {ok, total:d.length};
}

/* ---- 優先度ボタン ---- */
const tiersEl=document.getElementById("tiers");
TIERS.forEach(ti=>{
  const b=document.createElement("button");
  b.className="tierbtn"+(ti.t===curTier?" on":""); b.dataset.t=ti.t;
  b.innerHTML=`<div class="num">${ti.num}</div>
    <div class="cnt">${tierData(ti.t).length}<span style="font-size:11px;font-weight:600;color:var(--muted)"> 語</span></div>
    <div class="lab">${ti.lab}</div><div class="bar"><i></i></div>`;
  b.onclick=()=>{ curTier=ti.t; idx=0; revealed=false; resetOrder(); renderAll(); };
  tiersEl.appendChild(b);
});
function refreshTierBars(){
  document.querySelectorAll(".tierbtn").forEach(b=>{
    const t=+b.dataset.t, c=counts(t);
    b.querySelector(".bar>i").style.width=(c.total?Math.round(c.ok/c.total*100):0)+"%";
    b.classList.toggle("on", t===curTier);
  });
}

function resetOrder(){ order=visibleData().map((_,i)=>i); }

function renderAll(){
  refreshTierBars();
  const m=tierMeta(curTier); const c=counts(curTier);
  document.getElementById("tierdesc").innerHTML=
    m.desc+`<br><b style="color:var(--ink)">習得 ${c.ok}/${c.total}</b>`
    +(reviewOnly?` ・ 「まだ」${c.total-c.ok}語を表示中`:"");
  if(curMode==="flash") renderCard(); else renderList(document.getElementById("search").value);
}

/* ---- カード ---- */
const chipColors={1:["var(--t1b)","var(--t1)"],2:["var(--t2b)","var(--t2)"],3:["var(--t3b)","var(--t3)"],4:["var(--t4b)","var(--t4)"]};
function renderCard(){
  const data=visibleData();
  if(order.length!==data.length) resetOrder();
  if(data.length===0){
    document.getElementById("progress").textContent="";
    document.getElementById("card").style.display="none";
    document.querySelector(".judge").style.display="none";
    document.querySelector(".nav").style.display="none";
    if(!document.getElementById("emptyMsg")){
      const e=document.createElement("div"); e.id="emptyMsg"; e.className="empty";
      e.innerHTML= reviewOnly ? "この層は「まだ」が 0 語。全部覚えました 🎉<br>他の層へ、または「まだ」だけ表示をオフに。" : "表示できる語がありません。";
      document.getElementById("flash").appendChild(e);
    }
    return;
  }
  const em=document.getElementById("emptyMsg"); if(em) em.remove();
  document.getElementById("card").style.display="flex";
  document.querySelector(".judge").style.display="flex";
  document.querySelector(".nav").style.display="flex";

  if(idx>=data.length) idx=0;
  const c=data[order[idx]];
  document.getElementById("progress").innerHTML=`<b>${idx+1}</b> / ${data.length}`+(reviewOnly?" （まだ）":"");
  const chip=document.getElementById("chip");
  chip.textContent="TIER "+c.tier; chip.style.background=chipColors[c.tier][0]; chip.style.color=chipColors[c.tier][1];
  const sc=document.getElementById("statechip"); const st=stateOf(c.word);
  sc.className="statechip "+(st==="ok"?"sc-ok":st==="no"?"sc-no":"sc-none");
  sc.textContent= st==="ok"?"覚えた":st==="no"?"まだ":"未";

  const front = reverse ? c.meaning : c.word;
  const back  = reverse ? c.word : c.meaning;
  document.getElementById("kw").textContent=front;
  const km=document.getElementById("km"); km.textContent=back; km.style.display=revealed?"block":"none";
  document.getElementById("khint").style.display=revealed?"none":"block";
  document.getElementById("cmeta").innerHTML= revealed
    ? `出現 ${c.past_n}/4回`+(c.f96?` ・ 第96回内 ${c.f96}回`:"")+(c.inA?" ・ 頻出A":"")+(c.past?` ・ 回 ${c.past}`:"")
    : "";
  const sp=document.getElementById("speak"); sp.classList.toggle("show", tts);
  if(tts && ((!reverse) || revealed)) speak(c.word); // 表面が韓国語のとき、または裏返して韓国語が出たとき
}
document.getElementById("card").onclick=()=>{ revealed=!revealed; renderCard(); };

function advance(){ const d=visibleData(); if(d.length===0) return; idx=(idx+1); if(idx>=order.length) idx=0; revealed=false; renderCard(); }
function goPrev(){ const d=visibleData(); if(d.length===0) return; idx=(idx-1+order.length)%order.length; revealed=false; renderCard(); }

document.getElementById("next").onclick=advance;
document.getElementById("prev").onclick=goPrev;
document.getElementById("shuffle").onclick=()=>{ for(let i=order.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[order[i],order[j]]=[order[j],order[i]];} idx=0; revealed=false; renderCard(); };

function mark(state){
  const data=visibleData(); if(data.length===0) return;
  const c=data[order[idx]];
  states[c.word]=state; save();
  refreshTierBars();
  // review中に「覚えた」を付けたら、その語は対象外になるので order を作り直して同位置の次へ
  if(reviewOnly){ resetOrder(); if(idx>=order.length) idx=0; revealed=false; renderCard(); renderTierDesc(); }
  else { advance(); renderTierDesc(); }
}
function renderTierDesc(){ const m=tierMeta(curTier),c=counts(curTier);
  document.getElementById("tierdesc").innerHTML=m.desc+`<br><b style="color:var(--ink)">習得 ${c.ok}/${c.total}</b>`+(reviewOnly?` ・ 「まだ」${c.total-c.ok}語を表示中`:""); }
document.getElementById("markOk").onclick=()=>mark("ok");
document.getElementById("markNo").onclick=()=>mark("no");

/* ---- 読み上げ ---- */
let koVoice=null;
function pickVoice(){ const vs=speechSynthesis.getVoices(); koVoice=vs.find(v=>/ko/i.test(v.lang))||null; }
if("speechSynthesis" in window){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(text){
  if(!("speechSynthesis" in window)) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang="ko-KR"; if(koVoice)u.voice=koVoice; u.rate=.9;
  speechSynthesis.speak(u);
}
document.getElementById("speak").onclick=(e)=>{ e.stopPropagation(); const c=visibleData()[order[idx]]; if(c) speak(c.word); };

/* ---- 一覧 ---- */
function renderList(q=""){
  const data=visibleData(); const tb=document.getElementById("tbody"); tb.innerHTML=""; q=(q||"").trim();
  let shown=0;
  data.forEach(c=>{
    if(q && !(c.word.includes(q)||c.meaning.includes(q))) return;
    shown++;
    const st=stateOf(c.word);
    const tr=document.createElement("tr");
    tr.innerHTML=`<td class="w"><span class="dot d${c.tier}"></span>${c.word}${c.f96?`<span class="f96">96×${c.f96}</span>`:""}</td>
      <td class="m">${c.meaning}</td>
      <td class="s"><span class="lstate ${st==="ok"?"ls-ok":st==="no"?"ls-no":"ls-none"}" data-w="${c.word}">${st==="ok"?"覚えた":st==="no"?"まだ":"未"}</span> ${c.past||"—"}</td>`;
    tb.appendChild(tr);
  });
  if(shown===0){ const tr=document.createElement("tr"); tr.innerHTML=`<td colspan="3"><div class="empty" style="box-shadow:none">該当なし</div></td>`; tb.appendChild(tr); }
  tb.querySelectorAll(".lstate").forEach(el=>{
    el.onclick=()=>{ const w=el.dataset.w; const cur=stateOf(w);
      states[w]= cur==="none"?"ok": cur==="ok"?"no":"none"; save(); refreshTierBars(); renderTierDesc(); renderList(document.getElementById("search").value); };
  });
}
document.getElementById("search").oninput=e=>renderList(e.target.value);

/* ---- モード/トグル ---- */
document.querySelectorAll("#modeSeg button").forEach(b=>{
  b.onclick=()=>{ curMode=b.dataset.mode;
    document.querySelectorAll("#modeSeg button").forEach(x=>x.classList.toggle("on",x===b));
    document.getElementById("flash").classList.toggle("on",curMode==="flash");
    document.getElementById("list").classList.toggle("on",curMode==="list");
    resetOrder(); idx=0; revealed=false; renderAll(); };
});
document.getElementById("reviewBtn").onclick=function(){ reviewOnly=!reviewOnly; this.classList.toggle("on",reviewOnly); idx=0; revealed=false; resetOrder(); renderAll(); };
document.getElementById("reverseBtn").onclick=function(){ reverse=!reverse; this.classList.toggle("on",reverse); revealed=false; renderCard(); };
document.getElementById("ttsBtn").onclick=function(){ tts=!tts; this.classList.toggle("on",tts);
  if(tts && !("speechSynthesis" in window)){ alert("この端末は読み上げに未対応です。"); tts=false; this.classList.remove("on"); return; }
  document.getElementById("speak").classList.toggle("show",tts); if(tts) renderCard(); };

/* ---- キーボード ---- */
document.addEventListener("keydown",e=>{
  if(curMode!=="flash") return;
  if(e.key==="ArrowRight") advance();
  else if(e.key==="ArrowLeft") goPrev();
  else if(e.key===" "){ e.preventDefault(); document.getElementById("card").click(); }
  else if(e.key==="1") mark("no");
  else if(e.key==="2") mark("ok");
});

/* ---- リセット ---- */
const foot=document.getElementById("foot");
const total=TIERS.reduce((s,t)=>s+tierData(t.t).length,0);
foot.innerHTML=`全 ${total} 語 / T1 ${tierData(1).length}・T2 ${tierData(2).length}・T3 ${tierData(3).length}・T4 ${tierData(4).length}。過去問は選択肢語彙ベース、第96回は回内頻度を「96×n」で併記、第83回は一部欠落。<br>操作: スペース=答え / ←→=送り / 1=まだ 2=覚えた。 `;
const rb=document.createElement("button"); rb.className="danger"; rb.textContent="判定をすべてリセット";
rb.onclick=()=>{ if(confirm("覚えた/まだ の判定を全部消します。よろしいですか？")){ states={}; save(); idx=0; resetOrder(); renderAll(); } };
foot.appendChild(rb);

resetOrder(); renderAll();
</script>
</body>
</html>
